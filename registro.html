<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportVibe</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/index.html" class="logo">
                <i class="fa-solid fa-bolt"></i> Sport<span>Vibe</span>
            </a>
            
            <i class="fa-solid fa-bars menu-toggle" id="menu-toggle"></i>
            
            <ul class="nav-menu" id="nav-menu">
                <!-- Servido dinámicamente -->
            </ul>
            
            <div class="auth-buttons" id="auth-buttons">
                <!-- Servido dinámicamente -->
            </div>
        </div>
    </header>

    <!-- Main Content Form -->
    <main class="main-content">
        <div class="form-wrapper" style="max-width: 520px;">
            <div class="form-card">
                <h2>Crea tu Cuenta</h2>
                <p class="subtitle">Únete a la red deportiva recreativa más grande y activa</p>
                
                <form id="form-registro">
                    <!-- Nombre Completo field -->
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <div class="input-icon-wrapper">
                            <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan Pérez" required autocomplete="name">
                            <i class="fa-solid fa-id-card"></i>
                        </div>
                    </div>

                    <!-- Nombre de Usuario field -->
                    <div class="form-group">
                        <label for="username">Nombre de Usuario</label>
                        <div class="input-icon-wrapper">
                            <input type="text" id="username" class="form-control" placeholder="Ej. juanperez10" required autocomplete="username">
                            <i class="fa-solid fa-circle-user"></i>
                        </div>
                    </div>
                    
                    <!-- Correo Electrónico field -->
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <div class="input-icon-wrapper">
                            <input type="email" id="email" class="form-control" placeholder="juan@ejemplo.com" required autocomplete="email">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>
                    
                    <!-- Contraseña field -->
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <!-- Confirmar Contraseña field -->
                    <div class="form-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="confirm-password" class="form-control" placeholder="Repite tu contraseña" required autocomplete="new-password">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                    </div>

                    <!-- Action button -->
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-size: 1rem;">
                        <i class="fa-solid fa-user-plus"></i> Crear Cuenta
                    </button>
                </form>

                <p class="form-redirect">
                    ¿Ya tienes una cuenta? <a href="/login.html">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-logo">
                <i class="fa-solid fa-bolt" style="color: var(--accent-cyan)"></i> Sport<span>Vibe</span>
            </div>
            <ul class="footer-links">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/eventos.html">Eventos</a></li>
                <li><a href="/contacto.html">Contacto</a></li>
            </ul>
            <div class="footer-copy">
                &copy; 2026 SportVibe. Todos los derechos reservados.
            </div>
        </div>
    </footer>

    <!-- Script JS -->
    <script src="/js/script.js"></script>
</body>
</html>
